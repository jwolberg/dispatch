# Dispatch CI gate (Python) — runs on every pull request so the board's
# check-driven states reflect real results (Building → Ready to test → Blocked).
# Safe-by-default: dependency installs run only when the matching file exists, and
# lint/test run only when a linter/tests are actually present — so this is a no-op
# on a bare repo but catches real failures once you add deps/tests.
#
# NOTE: GitHub does not trigger workflows on events authored by GITHUB_TOKEN
# (github-actions[bot]). If claude-code-action opens PRs as the bot, install the
# Claude GitHub App so PRs are app-authored and trigger this gate.
name: CI
on:
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what's declared — a missing file is a no-op, but a broken
          # requirements/pyproject legitimately fails CI.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then pip install -e . || pip install .; fi
      - name: Lint
        run: |
          # Runs only if a linter got installed (declared in your deps).
          if command -v ruff >/dev/null 2>&1; then ruff check .;
          elif command -v flake8 >/dev/null 2>&1; then flake8;
          else echo "no linter installed — skipping"; fi
      - name: Test
        run: |
          # Runs only if tests exist (avoids pytest's "no tests collected" failure).
          if [ -d tests ] || ls test_*.py *_test.py >/dev/null 2>&1; then
            pip install pytest >/dev/null 2>&1 || true
            pytest
          else
            echo "no tests found — skipping"
          fi

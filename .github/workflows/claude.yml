name: Claude Code

# ADR-0006 [2]: this workflow does NOT open pull requests.
#
# `claude-code-action` pushes a branch under the default GITHUB_TOKEN and stops
# there. Dispatch's server notices the branch and opens the PR itself, using its
# GitHub App installation token — a PR opened that way triggers `on: pull_request`
# CI without an approval gate, which #22 observed directly rather than inferring
# (ADR-0006 [8]).
#
# The `gh pr create` post-step under a `GH_PAT` secret that used to live here is
# deleted on purpose. Do not restore it: it hands every onboarded repo a token
# that can write to every repo the PAT can reach. Until #4 ships the poller's
# PR-opening half, a branch pushed here simply has no PR yet.
#
# The only secret this needs is Claude auth. No GH_PAT, no APP_PRIVATE_KEY.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Push Claude's branch. The PR is opened by Dispatch, not here, so
      # `pull-requests: write` is deliberately absent.
      contents: write
      issues: write # the tracking comment claude-code-action posts
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pass the default GITHUB_TOKEN *explicitly* (ADR-0006 [2]). This input has
          # no default: omit it and claude-code-action performs an App token exchange
          # against Anthropic's Claude GitHub App, which is not installed here and
          # 401s — observed in run 29068754525, fixed by #25. `github.token` is all
          # the branch push needs, and it writes no credential into this repo.
          github_token: ${{ github.token }}
          #
          # Do NOT set `prompt:` here. A static prompt forces automation mode, which
          # IGNORES the @claude comment. Omitting it enables interactive (mention)
          # mode: Claude reads the comment, runs it (incl. project skills under
          # .claude/skills/), posts a tracking comment, and pushes a branch.
          claude_args: |
            --append-system-prompt "Dispatch installs its CI skills under .claude/skills/ namespaced as ci-plan, ci-implement, and ci-debug (kept distinct from any interactive plan/implement/debug skills the repo carries). When the @claude comment names one of them, run that ci-* skill. Implement the change on a branch and commit it; Dispatch opens the pull request from your branch. Reference the issue with 'Fixes #<n>'."
